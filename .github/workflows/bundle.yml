name: Build APK

on:
  workflow_dispatch:

jobs:
  build:
    name: Build Release APK
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4
        with:
          submodules: recursive

      - name: Set up JDK 17
        uses: actions/setup-java@v4
        with:
          java-version: '17'
          distribution: 'temurin'

      - name: Cache Gradle
        uses: actions/cache@v4
        with:
          path: |
            ~/.gradle/caches
            ~/.gradle/wrapper
          key: gradle-v2-${{ hashFiles('**/*.gradle.kts', '**/gradle.properties', '**/gradle/wrapper/gradle-wrapper.properties') }}
          restore-keys: |
            gradle-v2-

      - name: Generate release keystore
        run: |
          keytool -genkeypair \
            -keystore release.jks \
            -alias lemuroid \
            -keyalg RSA \
            -keysize 2048 \
            -validity 10000 \
            -storepass lemuroid \
            -keypass lemuroid \
            -dname "CN=Lemuroid, O=Lemuroid, C=US"

      - name: Grant execute permission for gradlew
        run: chmod +x gradlew

      - name: Build Release APK
        run: ./gradlew :lemuroid-app:assembleFreeBundleRelease --no-configuration-cache --stacktrace

      - name: Upload APK
        uses: actions/upload-artifact@v4
        with:
          name: lemuroid-release
          path: lemuroid-app/build/outputs/apk/freeBundle/release/lemuroid-app-free-bundle-release.apk

# Gradle
org.gradle.parallel=true
org.gradle.daemon=true
org.gradle.jvmargs=-Xmx4096m -XX:MaxMetaspaceSize=512m -XX:+HeapDumpOnOutOfMemoryError -XX:+UseG1GC -Dfile.encoding=UTF-8
org.gradle.caching=true
# https://github.com/gradle/kotlin-dsl/issues/311
org.gradle.configureondemand=false
# Kotlin
kotlin.incremental.usePreciseJavaTracking=true
kotlin.daemon.jvm.options=-Xmx2048m -XX:+UseG1GC
# Android
android.builder.sdkDownload=true
# AndroidX
android.useAndroidX=true
android.enableJetifier=true
org.gradle.configuration-cache=true
# R8 full mode: more aggressive dead code elimination + inlining
android.enableR8.fullMode=true
# Native build: only arm64
android.buildOnlyTargetAbi=true
